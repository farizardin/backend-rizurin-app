kind: pipeline
type: docker
name: default

services:
  - name: database
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rizurin_app_test

steps:
  - name: test
    image: node:20-alpine
    environment:
      DB_HOST: database
    commands:
      - sleep 5
      - npm install
      - npx sequelize-cli db:create --env test || true
      - npm test

  - name: migrate_production_db
    image: node:20-alpine
    environment:
      NODE_ENV: production
    commands:
      - npm install
      - npx sequelize-cli db:create --env production || true
      - npx sequelize-cli db:migrate --env production
    when:
      branch:
        - master

  - name: build_and_push_docker
    image: docker:20.10
    environment:
      DOCKER_USER:
        from_secret: docker_user
      DOCKER_PASS:
        from_secret: docker_pass
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - echo "$DOCKER_PASS" | docker login http://192.168.8.51:5000 -u "$DOCKER_USER" --password-stdin
      - docker buildx create --use || true
      - docker buildx build --platform linux/amd64 --output type=docker -t 192.168.8.51:5000/rizurin/rizurin-app-api:${DRONE_BUILD_NUMBER} .
      - docker tag 192.168.8.51:5000/rizurin/rizurin-app-api:${DRONE_BUILD_NUMBER} 192.168.8.51:5000/rizurin/rizurin-app-api:latest
      - docker push 192.168.8.51:5000/rizurin/rizurin-app-api:${DRONE_BUILD_NUMBER}
      - docker push 192.168.8.51:5000/rizurin/rizurin-app-api:latest

    when:
      branch:
        - master

  - name: deploy_to_k8s
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" > ~/.kube/config
      - kubectl apply -f k8s/
      - kubectl set image deployment/rizurin-app-api rizurin-app-api=192.168.8.51:5000/rizurin/rizurin-app-api:${DRONE_BUILD_NUMBER} -n rizurin
      - kubectl rollout status deployment/rizurin-app-api -n rizurin
    when:
      branch:
        - master

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock